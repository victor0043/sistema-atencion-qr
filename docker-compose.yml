services:

  db:
    image: postgres:15
    container_name: hospitalqr_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: hospital_qr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d hospital_qr"]
      interval: 10s
      timeout: 5s
      retries: 5

###########################################################

  auth-service:

    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile

    container_name: hospitalqr_auth_service

    restart: unless-stopped

    ports:
      - "3003:3003"

    environment:

      PORT: 3003

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres
      DB_PASSWORD: admin123

      JWT_SECRET: HospitalQR2026
      JWT_EXPIRES: 8h

    depends_on:

      db:
        condition: service_healthy

###########################################################

  admin-service:

    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile

    container_name: hospitalqr_admin_service

    restart: unless-stopped

    ports:
      - "3001:3001"

    environment:

      PORT: 3001

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres
      DB_PASSWORD: admin123

      JWT_SECRET: HospitalQR2026
      JWT_EXPIRES: 8h

      PATIENT_SERVICE_URL: http://patient-service:3005

      INTERNAL_API_KEY: secret-internal-key

    depends_on:

      db:
        condition: service_healthy

      patient-service:
        condition: service_started

###########################################################

  patient-service:

    build:
      context: ./backend/patient-service
      dockerfile: Dockerfile

    container_name: hospitalqr_patient_service

    restart: unless-stopped

    ports:
      - "3005:3005"

    environment:

      PORT: 3005

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres
      DB_PASSWORD: admin123

      JWT_SECRET: HospitalQR2026
      JWT_EXPIRES: 8h

      INTERNAL_API_KEY: secret-internal-key

    depends_on:

      db:
        condition: service_healthy

###########################################################

  medical-service:

    build:
      context: ./backend/medical-service
      dockerfile: Dockerfile

    container_name: hospitalqr_medical_service

    restart: unless-stopped

    ports:
      - "3004:3004"

    environment:

      PORT: 3004

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres
      DB_PASSWORD: admin123

      JWT_SECRET: HospitalQR2026
      JWT_EXPIRES: 8h

    depends_on:

      db:
        condition: service_healthy

###########################################################

  appointment-service:

    build:
      context: ./backend/appointment-service
      dockerfile: Dockerfile

    container_name: hospitalqr_appointment_service

    restart: unless-stopped

    ports:
      - "3002:3002"

    environment:

      PORT: 3002

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres
      DB_PASSWORD: admin123

      JWT_SECRET: HospitalQR2026
      JWT_EXPIRES: 8h

      INTERNAL_API_KEY: secret-internal-key

    depends_on:

      db:
        condition: service_healthy

###########################################################

  frontend:

    build:

      context: ./frontend
      dockerfile: Dockerfile

    container_name: hospitalqr_frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    environment:

      VITE_AUTH_URL: http://localhost:3003

      VITE_ADMIN_URL: http://localhost:3001

      VITE_PATIENT_URL: http://localhost:3005

      VITE_APPOINTMENT_URL: http://localhost:3002

      VITE_MEDICAL_URL: http://localhost:3004

    depends_on:

      auth-service:
        condition: service_started

      admin-service:
        condition: service_started

      patient-service:
        condition: service_started

      appointment-service:
        condition: service_started

      medical-service:
        condition: service_started

volumes:

  db_data: