services:

  db:
    image: postgres:15
    container_name: hospitalqr_db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: hospital_qr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d hospital_qr"]
      interval: 10s
      timeout: 5s
      retries: 5

###########################################################

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: hospitalqr_azurite
    restart: unless-stopped

    # --skipApiVersionCheck: el SDK @azure/storage-blob más nuevo puede pedir una
    # versión de API más reciente que la que Azurite valida por defecto.
    command: "azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck"

    ports:
      - "10000:10000"

    volumes:
      - azurite_data:/data

###########################################################

  auth-service:

    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile

    container_name: hospitalqr_auth_service

    restart: unless-stopped

    ports:
      - "3003:3003"

    env_file:
      - .env

    environment:

      PORT: 3003

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres

      JWT_EXPIRES: 8h

    depends_on:

      db:
        condition: service_healthy

###########################################################

  admin-service:

    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile

    container_name: hospitalqr_admin_service

    restart: unless-stopped

    ports:
      - "3001:3001"

    env_file:
      - .env

    environment:

      PORT: 3001

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres

      JWT_EXPIRES: 8h

      PATIENT_SERVICE_URL: http://patient-service:3005
      APPOINTMENT_SERVICE_URL: http://appointment-service:3002

    depends_on:

      db:
        condition: service_healthy

      patient-service:
        condition: service_started

###########################################################

  patient-service:

    build:
      context: ./backend/patient-service
      dockerfile: Dockerfile

    container_name: hospitalqr_patient_service

    restart: unless-stopped

    ports:
      - "3005:3005"

    env_file:
      - .env

    environment:

      PORT: 3005

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres

      JWT_EXPIRES: 8h

    depends_on:

      db:
        condition: service_healthy

###########################################################

  medical-service:

    build:
      context: ./backend/medical-service
      dockerfile: Dockerfile

    container_name: hospitalqr_medical_service

    restart: unless-stopped

    ports:
      - "3004:3004"

    env_file:
      - .env

    environment:

      PORT: 3004

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres

      JWT_EXPIRES: 8h

    depends_on:

      db:
        condition: service_healthy

###########################################################

  appointment-service:

    build:
      context: ./backend/appointment-service
      dockerfile: Dockerfile

    container_name: hospitalqr_appointment_service

    restart: unless-stopped

    ports:
      - "3002:3002"

    env_file:
      - .env

    environment:

      PORT: 3002

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hospital_qr
      DB_USER: postgres

      JWT_EXPIRES: 8h

      ADMIN_SERVICE_URL: http://admin-service:3001

    depends_on:

      db:
        condition: service_healthy

      azurite:
        condition: service_started

###########################################################

  frontend:

    build:

      context: ./frontend
      dockerfile: Dockerfile

      # Vite compila import.meta.env.VITE_* de forma estática: deben llegar como
      # build args (no como environment:, que solo existe en runtime del contenedor,
      # demasiado tarde para un build ya hecho). Apuntan a localhost porque estas URLs
      # las usa el navegador del usuario, que corre fuera de la red interna de Docker.
      args:
        VITE_AUTH_URL: http://localhost:3003
        VITE_ADMIN_URL: http://localhost:3001
        VITE_PATIENT_URL: http://localhost:3005
        VITE_APPOINTMENT_URL: http://localhost:3002
        VITE_MEDICAL_URL: http://localhost:3004

    container_name: hospitalqr_frontend

    restart: unless-stopped

    ports:
      - "5173:4173"

    depends_on:

      auth-service:
        condition: service_started

      admin-service:
        condition: service_started

      patient-service:
        condition: service_started

      appointment-service:
        condition: service_started

      medical-service:
        condition: service_started

volumes:

  db_data:
  azurite_data: